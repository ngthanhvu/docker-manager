name: docker-manager

services:
  backend:
    container_name: docker-manager-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DOCKER_UI_DB_PATH=/app/data/app.db
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - backend_go_mod:/go/pkg/mod
      - backend_go_build:/root/.cache/go-build
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      - ../:/root/stsbmt:ro
    networks:
      - docker-manager-network

  frontend:
    container_name: docker-manager-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - docker-manager-network

volumes:
  backend_go_mod:
  backend_go_build:
  frontend_node_modules:


networks:
  docker-manager-network:
    name: docker-manager-network
    driver: bridge
